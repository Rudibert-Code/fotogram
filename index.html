<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="icon" type="icon-fotogram" href="./assets/icon/logo-icon.png">
    <link rel="stylesheet" href="./style.css">
</head>
<body onload="renderImages()">
    <header>
        <section class="header-info">
            <img src="./assets/icon/logo.png" alt="Fotogram Icon">
        </section>
    </header>
    <main>
        <article class="main-content">
            <h1>Your personal photo album</h1>
            <section id="img-location" class="img-collection">
            </section>
        </article>
        <dialog id="img-closeup" aria-labelledby="dialoge-url">
            <section class="dialog-container">
                <section class="dialog-header">
                    <h2 id="dialoge-url"></h2>
                    <a aria-label="Exit Dialog" class="dialog-exit-button" href="#" onclick="closeDialog()"></a>
                </section>
                <section class="dialog-main" id="dialogMain"></section>
                <section class="dialog-footer" id="dialogFooter">
                    <a class="dialog-img-button-l" href="#" onclick="buttonPrevious()"></a>
                    <p class="dialog-img-number" id="dialog-img-number"></p>
                    <a class="dialog-img-button-r" href="#" onclick="buttonNext()"></a>
                </section>
            </section>
        </dialog>
    </main>
    <footer>
        <section class="footer-info">
            <img src="./assets/icon/logo-dev.png" alt="Developer Academy Icon">
            <p>© 2023 Developer Akademie GmbH</p>
        </section>
    </footer>
</body>
    <script src="./script.js"></script>
</html>
